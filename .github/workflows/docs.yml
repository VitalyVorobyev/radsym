name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Install mdBook
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          tag=$(curl -sSf https://api.github.com/repos/rust-lang/mdBook/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${tag}/mdbook-${tag}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Build mdBook (landing page)
      - name: Build book
        run: mdbook build book

      # Build rustdoc
      - name: Build rustdoc
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings --default-theme ayu

      # Assemble site: book at root, rustdoc at /api/
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r book/book/* _site/
          cp -r target/doc _site/api

          # Redirect /api/ -> /api/radsym/
          cat > _site/api/index.html << 'REDIRECT'
          <!DOCTYPE html>
          <html>
          <head><meta http-equiv="refresh" content="0; url=radsym/index.html"></head>
          <body><a href="radsym/index.html">API Documentation</a></body>
          </html>
          REDIRECT

          # Prevent Jekyll processing
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
